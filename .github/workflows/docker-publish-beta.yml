name: Build and Push Beta to Docker Hub

on:
  workflow_run:
    workflows: [Quality Gate]
    branches: [beta]
    types: [completed]

env:
  IMAGE_APP: ${{ secrets.DOCKERHUB_USERNAME }}/ancient-coins
  IMAGE_AGENT: ${{ secrets.DOCKERHUB_USERNAME }}/ancient-coins-agent

jobs:
  build-and-push-app:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare image tags
        id: tags
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          short_sha="${HEAD_SHA::7}"
          echo "tags=${IMAGE_APP}:sha-${HEAD_SHA},${IMAGE_APP}:sha-${short_sha},${IMAGE_APP}:beta" >> "$GITHUB_OUTPUT"

      - name: Set build date
        id: date
        run: echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build and push app
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            APP_VERSION=${{ github.event.workflow_run.head_sha }}
            BUILD_DATE=${{ steps.date.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-agent:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare image tags
        id: tags
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          short_sha="${HEAD_SHA::7}"
          echo "tags=${IMAGE_AGENT}:sha-${HEAD_SHA},${IMAGE_AGENT}:sha-${short_sha},${IMAGE_AGENT}:beta" >> "$GITHUB_OUTPUT"

      - name: Build and push agent
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: src/agent
          file: src/agent/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
