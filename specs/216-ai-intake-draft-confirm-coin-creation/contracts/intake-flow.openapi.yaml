openapi: 3.0.3
info:
  title: AI Intake Draft + Commit API
  version: 0.1.0
  description: |
    Issue #216 contract for confirm-gated AI intake.
    Draft generation never persists a coin; commit requires explicit confirmation.
servers:
  - url: /api
paths:
  /coins/intake/draft:
    post:
      summary: Create AI intake draft
      description: Generate and persist a draft candidate with confidence and evidence from coin images and optional coin-card upload.
      tags: [coin-intake]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IntakeDraftRequest'
      responses:
        '200':
          description: Draft created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntakeDraftResponse'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
  /coins/intake/commit:
    post:
      summary: Confirm and persist intake draft
      description: Persist a coin from a draft after explicit user confirmation.
      tags: [coin-intake]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IntakeCommitRequest'
      responses:
        '200':
          description: Commit succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntakeCommitResponse'
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '404':
          description: Draft not found for authenticated user
        '409':
          description: Draft state conflict (already confirmed/expired/discarded)
components:
  schemas:
    IntakeDraftRequest:
      type: object
      required: [images]
      properties:
        images:
          type: array
          minItems: 1
          description: Coin image URIs sourced from camera capture and/or file upload.
          items:
            type: string
            format: uri
        coinCardImage:
          type: string
          format: uri
          description: Optional metadata card image URI.
    IntakeDraftResponse:
      type: object
      required: [draftId, status, coin, confidenceSummary, evidence]
      properties:
        draftId:
          type: integer
        status:
          type: string
          enum: [drafted]
        coin:
          type: object
          additionalProperties: true
        confidenceSummary:
          type: object
          properties:
            overall:
              type: string
              enum: [high, medium, low]
            uncertainFields:
              type: array
              items:
                type: string
        evidence:
          type: array
          items:
            $ref: '#/components/schemas/IntakeEvidenceItem'
        unresolvedFields:
          type: array
          items:
            type: string
    IntakeEvidenceItem:
      type: object
      required: [type, source, confidence]
      properties:
        type:
          type: string
          enum: [ocr, visual, catalog_lookup, user_input, coin_card]
        source:
          type: string
        field:
          type: string
        value:
          type: string
        confidence:
          type: string
          enum: [high, medium, low]
        notes:
          type: string
    IntakeCommitRequest:
      type: object
      required: [draftId, confirm]
      properties:
        draftId:
          type: integer
        confirm:
          type: boolean
          enum: [true]
        overrides:
          type: object
          additionalProperties: true
    IntakeCommitResponse:
      type: object
      required: [draftId, status, coinId]
      properties:
        draftId:
          type: integer
        status:
          type: string
          enum: [confirmed]
        coinId:
          type: integer
        journalSource:
          type: string
          enum: [coin_intake]
