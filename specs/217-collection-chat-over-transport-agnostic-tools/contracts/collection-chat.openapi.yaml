openapi: 3.0.3
info:
  title: Collection Chat API
  version: 0.1.0
  description: |
    Issue #217 contracts for collection chat over transport-agnostic tools.
    Read operations are user-scoped. Writes are two-phase with proposal token + explicit commit.
servers:
  - url: /api
security:
  - BearerAuth: []
paths:
  /agent/chat:
    post:
      summary: Stream chat response (search or collection mode)
      description: |
        Existing SSE chat endpoint with mode-aware routing.
        `mode=collection` routes to collection-aware tool behavior.
      tags: [agent-chat]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentChatRequest'
      responses:
        '200':
          description: SSE stream containing status/content/done events
          content:
            text/event-stream:
              schema:
                type: string
        '400':
          description: Invalid request or disallowed operation
        '401':
          description: Unauthorized

  /agent/collection/proposals/{proposalId}/commit:
    post:
      summary: Commit proposed collection update
      description: Commit a previously proposed update after explicit user confirmation.
      tags: [collection-chat]
      parameters:
        - name: proposalId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommitCollectionProposalRequest'
      responses:
        '200':
          description: Proposal committed and change persisted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommitCollectionProposalResponse'
        '400':
          description: Validation failure
        '401':
          description: Unauthorized
        '404':
          description: Proposal not found for authenticated user
        '409':
          description: Proposal expired, cancelled, or already committed

  /agent/collection/proposals/{proposalId}/cancel:
    post:
      summary: Cancel proposed collection update
      description: Cancel a pending proposal without mutating coin data.
      tags: [collection-chat]
      parameters:
        - name: proposalId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Proposal cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelCollectionProposalResponse'
        '401':
          description: Unauthorized
        '404':
          description: Proposal not found for authenticated user
        '409':
          description: Proposal already terminal

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    AgentChatRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
          minLength: 1
        mode:
          type: string
          enum: [search, collection]
          default: search
        history:
          type: array
          items:
            $ref: '#/components/schemas/ChatHistoryMessage'
    ChatHistoryMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
    CommitCollectionProposalRequest:
      type: object
      required: [proposalToken, confirm]
      properties:
        proposalToken:
          type: string
        confirm:
          type: boolean
          enum: [true]
    CommitCollectionProposalResponse:
      type: object
      required: [proposalId, status, coinId, changedFields, journalSource]
      properties:
        proposalId:
          type: string
        status:
          type: string
          enum: [committed]
        coinId:
          type: integer
        changedFields:
          type: array
          items:
            type: string
        journalSource:
          type: string
          enum: [collection_chat]
    CancelCollectionProposalResponse:
      type: object
      required: [proposalId, status]
      properties:
        proposalId:
          type: string
        status:
          type: string
          enum: [cancelled]
