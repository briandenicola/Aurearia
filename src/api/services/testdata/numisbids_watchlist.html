<!--

  Account identifiers, session cookies, and personal data have been removed.
  Used by numisbids_service_test.go to guard against markup-drift regressions.
  Do NOT commit real HAR files — see F021/F022 notes.

  FIXTURE SOURCE NOTE: the /watchlist HTTP response is delivered as
  content-encoding: br (Brotli) from Cloudflare to browser clients. Chrome
  DevTools HAR export omits the decoded body for Brotli responses, so the
  HAR body is always empty for this URL. Do NOT attempt to recover the HTML
  from a HAR capture of /watchlist — it will not be there.

  The Go scraper (newScraperClient) uses the default http.Transport, which
  advertises only Accept-Encoding: gzip. Cloudflare responds with gzip for
  non-Brotli clients, which Go decompresses transparently. The Brotli
  encoding in the HAR is browser-specific and does not affect the scraper.

  This fixture was reconstructed from: (1) the lot-page HTML for sale 10918
  lot 1 (captured and decoded from the same HAR), (2) the /bidhistory page
  (decoded, same HAR), which share the same togglewatch/browse-div markup
  patterns, and (3) the task description confirming one current watched lot
  with sale group 10918, lot URL /sale/10918/lot/1, Starting price 40 EUR,
  and a media.numisbids.com thumbnail image.
-->
